name: Generate Search Index

on:
  push:
    branches:
      - main  # Change this to your default branch if it's 'master'
    paths-ignore:
      - 'search_index.json' # Prevent infinite loops if the action commits the index

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Run Indexing Script
        run: python scripts/generate_index.py

      - name: Commit and Push Index
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add search_index.json
          # Only commit if there is a change to the JSON
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-generate search index"
          git push